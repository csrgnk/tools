<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CSR Tools</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            margin: 0;
            padding: 0;
        }

        /* Header */
        .header {
            background-color: #0073e6;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header .site-name {
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            text-decoration: none;
        }

        .header .codex-link {
            display: inline-block;
            padding: 10px 18px;
            background: #16a34a;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .header .codex-link:hover {
            background: #138b43;
            transform: translateY(-2px);
        }

        /* Main menu grid */
        .main-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .tool-box {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            text-decoration: none;
            color: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tool-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.12);
        }

        .tool-icon {
            font-size: 36px;
            margin-bottom: 10px;
            color: #0073e6;
        }

        .tool-title {
            font-size: 18px;
            font-weight: bold;
            color: #0073e6;
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            font-size: 14px;
            color: #555;
            border-top: 1px solid #eee;
        }

        @media (max-width: 480px) {
            .header { font-size: 20px; padding: 15px; }
            .tool-icon { font-size: 28px; }
            .tool-title { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="site-name">CSR Tools</span>
        <a href="cheatsheet.html" class="codex-link">Codex Cheatsheet</a>
    </div>

    <div class="main-menu">
        <a href="post-editor.html" class="tool-box">
            <div class="tool-icon">✏️</div>
            <div class="tool-title">Post Editor</div>
        </a>

        <a href="add-post.html" class="tool-box">
            <div class="tool-icon">📝</div>
            <div class="tool-title">Add Post</div>
        </a>

        <a href="auto-media-html.html" class="tool-box">
            <div class="tool-icon">🎥</div>
            <div class="tool-title">Auto Media HTML Generator</div>
        </a>
    </div>

    <footer>
        &copy; 2026 CSR Tools. All rights reserved.
    </footer>

</body>
</html>
