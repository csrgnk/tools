<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Preview Tool - CSR Tools</title>
    <style>
        /* Integrated Header Styles */
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f9f9f9; }
        .header { background-color: #0073e6; padding: 15px 20px; text-align: center; }
        .header .site-name { color: white; font-size: 24px; font-weight: bold; text-decoration: none; }
        
        /* Tool Layout */
        .container { padding: 20px; max-width: 900px; margin: 0 auto; }
        h2 { text-align: center; margin-bottom: 15px; color: #333; }
        
        #inputType { margin-bottom: 10px; padding: 8px; font-size: 16px; border-radius: 6px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        textarea { width: 100%; min-height: 150px; border: 1px solid #ccc; border-radius: 6px; padding: 10px; font-family: monospace; margin-bottom: 15px; box-sizing: border-box; font-size: 14px; }
        
        #preview { border: 2px solid #0073e6; border-radius: 6px; padding: 15px; min-height: 200px; background: white; margin-bottom: 15px; overflow-x: auto; }
        
        .btn-group { margin-bottom: 20px; display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button#previewBtn { background: #16a34a; color: white; }
        button#clearBtn { background: #dc3545; color: white; }
        button:hover { opacity: 0.9; }
        
        a#backHome { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: #0073e6; font-weight: bold; }
        a#backHome:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="site-name">CSR Tools</a>
</div>

<div class="container">
    <h2>Content Preview & Visual Mode</h2>

    <label for="inputType" style="font-weight: bold;">Select Input Type:</label>
    <select id="inputType">
        <option value="html">HTML / PHP (Standard Rendering)</option>
        <option value="txt">Plain Text (Keeps Line Breaks)</option>
    </select>

    <textarea id="inputBox" placeholder="Paste your HTML or text here..."></textarea>

    <div class="btn-group">
        <button id="previewBtn">Live Preview</button>
        <button id="clearBtn">Clear Input</button>
    </div>

    <h3 style="border-left: 5px solid #0073e6; padding-left: 10px;">Visual Mode Preview:</h3>
    <div id="preview" contenteditable="true"></div>

    <a id="backHome" href="index.html">← Back to Home</a>
</div>

<script>
    const inputBox = document.getElementById('inputBox');
    const previewDiv = document.getElementById('preview');
    const previewBtn = document.getElementById('previewBtn');
    const clearBtn = document.getElementById('clearBtn');
    const inputType = document.getElementById('inputType');

    // Display preview in Visual Mode
    previewBtn.addEventListener('click', () => {
        let val = inputBox.value;
        const type = inputType.value;

        if (val.trim() === "") {
            return alert("Please paste some content first!");
        }

        if (type === 'txt') {
            // Escape HTML characters for Text mode so tags don't render
            val = val
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>');
            previewDiv.innerHTML = val;
        } else {
            // HTML mode: Renders tags as live elements
            previewDiv.innerHTML = val;
        }
    });

    // Clear input and preview
    clearBtn.addEventListener('click', () => {
        if (confirm("Are you sure you want to clear the input?")) {
            inputBox.value = '';
            previewDiv.innerHTML = '';
        }
    });
</script>

</body>
</html>
