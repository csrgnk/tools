<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Editor - Full Features</title>
    <style>
        /* Integrated Header Styles */
        body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f9f9f9; }
        .header { background-color: #0073e6; padding: 15px 20px; text-align: center; }
        .header .site-name { color: white; font-size: 24px; font-weight: bold; text-decoration: none; }
        
        /* Editor Styles */
        .main-container { padding: 10px; max-width: 1000px; margin: 0 auto; }
        h2 { text-align:center; margin-bottom:15px; }
        
        /* REMOVED STICKY POSITIONING */
        #toolbar { 
            display:flex; 
            flex-wrap:wrap; 
            gap:5px; 
            margin-bottom:10px; 
            background:#eee; 
            padding:10px; 
            border-radius:6px; 
            border: 1px solid #ccc;
        }
        
        #toolbar button, #toolbar select, #toolbar input[type=color] {
            padding:6px 10px; font-size:14px; border:1px solid #ccc; border-radius:4px; background:white; cursor:pointer;
        }
        #toolbar button:hover, #toolbar select:hover { background:#ddd; }
        #toolbar input[type=color] { padding:2px; width:32px; height:32px; }
        
        #editor {
            border:1px solid #ccc;
            padding:15px;
            min-height:400px;
            outline:none;
            background:white;
            border-radius:6px;
            font-size: 18px; 
            line-height: 1.6;
            position:relative;
        }
        
        /* Ensures pasted text respects the large font size */
        #editor p, #editor div, #editor span {
            font-size: 18px;
        }

        #editor:empty:before {
            content: "Type your post here...";
            color: #999;
            pointer-events: none;
        }
        
        textarea { width:100%; min-height:200px; margin-top:10px; border-radius:6px; padding:8px; border:1px solid #ccc; font-family:monospace; box-sizing: border-box; font-size: 14px; }
        button#generate, button#copyHTML { margin-top:10px; padding:12px 24px; font-size:16px; background:green; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold; }
        button#copyHTML { background: #0073e6; }
        
        a#backHome { display:block; text-align:center; margin-top:15px; text-decoration:none; color:#0073e6; font-weight:bold; padding-bottom: 20px; }
        
        iframe, img { max-width:100%; height: auto; }
        .responsive-video { position:relative; width:100%; padding-bottom:56.25%; margin:10px 0; }
        .responsive-video iframe { position:absolute; top:0; left:0; width:100%; height:100%; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="site-name">CSR Tools</a>
</div>

<div class="main-container">
    <h2>📄 Post Editor - Full Features</h2>

    <div id="toolbar">
        <button onclick="format('bold')"><b>B</b></button>
        <button onclick="format('italic')"><i>I</i></button>
        <button onclick="format('underline')"><u>U</u></button>
        <button onclick="format('insertOrderedList')">OL</button>
        <button onclick="format('insertUnorderedList')">UL</button>
        <button onclick="format('justifyLeft')">⯇</button>
        <button onclick="format('justifyCenter')">≡</button>
        <button onclick="format('justifyRight')">⯈</button>
        <select onchange="format('formatBlock', this.value)">
            <option value="">Heading</option>
            <option value="<h1>">H1</option>
            <option value="<h2>">H2</option>
            <option value="<h3>">H3</option>
        </select>
        <button onclick="createLink()">🔗 Link</button>
        <input type="color" id="textColor" onchange="setTextColor(this.value)" title="Text Color">
        <select id="boxStyle">
            <option value="">Box</option>
            <option value="background-color:#ffff99;padding:5px;border-radius:4px;display:inline-block;">Tip</option>
            <option value="background-color:#ffcc99;padding:5px;border-radius:4px;display:inline-block;">Warning</option>
            <option value="background-color:#99ffcc;padding:5px;border-radius:4px;display:inline-block;">Note</option>
            <option value="background-color:#99ccff;padding:5px;border-radius:4px;display:inline-block;">Info</option>
        </select>
        <button onclick="wrapBox()">▭</button>
        <input type="color" id="customBoxColor" title="Custom Box Color">
        <button onclick="wrapCustomBox()">🖌️ Apply Box</button>
        <select onchange="setFontSize(this.value)">
            <option value="">Font Size</option>
            <option value="3">Normal (18px)</option>
            <option value="4">Medium</option>
            <option value="5">Large</option>
            <option value="6">Very Large</option>
            <option value="7">Huge</option>
        </select>
        <button onclick="insertYouTubeEmbed()">🎬 Embed</button>
    </div>

    <div id="editor" contenteditable="true"></div>

    <button id="generate" onclick="generateHTML()">Generate HTML</button>
    <button id="copyHTML" onclick="copyHTML()">Copy HTML</button>

    <h3>Generated HTML:</h3>
    <textarea id="output" readonly placeholder="Your HTML code will appear here..."></textarea>

    <a id="backHome" href="index.html">← Back to Home</a>
</div>

<script>
    const editor = document.getElementById('editor');
    const output = document.getElementById('output');

    // Fix for small text when pasting
    editor.addEventListener('paste', (e) => {
        setTimeout(() => {
            const allElements = editor.querySelectorAll('*');
            allElements.forEach(el => {
                if(el.style.fontSize) {
                    el.style.fontSize = "18px";
                }
            });
        }, 10);
    });

    function format(cmd, val=null){ 
        document.execCommand(cmd, false, val); 
    }

    function createLink(){ 
        let url = prompt("Enter URL (include https://)", "https://"); 
        if(url) format("createLink", url); 
    }

    function setTextColor(color){ 
        format('foreColor', color); 
    }

    function setFontSize(size){
        if(!size) return;
        format('fontSize', size);
    }

    function wrapBox(){
        const style = document.getElementById('boxStyle').value;
        if(!style) return alert('Select a box style first!');
        applySpanStyle(style);
    }

    function wrapCustomBox(){
        const color = document.getElementById('customBoxColor').value;
        const style = `background-color:${color}; padding:2px 4px; border-radius:4px; display:inline-block;`;
        applySpanStyle(style);
    }

    function applySpanStyle(cssText) {
        const sel = window.getSelection();
        if(sel.rangeCount > 0){
            const range = sel.getRangeAt(0);
            if(range.toString().length > 0){
                const span = document.createElement('span');
                span.style.cssText = cssText;
                span.appendChild(range.extractContents());
                range.insertNode(span);
            } else { alert('Select text first!'); }
        }
    }

    function insertYouTubeEmbed() {
        const url = prompt("Enter YouTube Video URL or ID:");
        if (url) {
            let videoId = "";
            if (url.includes("v=")) videoId = url.split("v=")[1].split("&")[0];
            else if (url.includes("youtu.be/")) videoId = url.split("youtu.be/")[1];
            else videoId = url;

            const embed = `<div class="responsive-video"><iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe></div><br>`;
            document.execCommand('insertHTML', false, embed);
        }
    }

    function generateHTML() {
        const rawContent = editor.innerHTML;
        // Output also includes the font-size fix for the live site
        const styledOutput = `<div style="font-size: 18px; line-height: 1.6; font-family: Arial, sans-serif;">\n${rawContent}\n</div>`;
        output.value = styledOutput;
    }

    function copyHTML() {
        if(!output.value) return alert("Generate HTML first!");
        output.select();
        document.execCommand("copy");
        alert("HTML copied to clipboard!");
    }
</script>

</body>
</html>
