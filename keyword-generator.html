<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Keyword Generator - CSR Tools</title>
    <style>
        /* Shared Header Styles */
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f9f9f9; }
        .header { background-color: #0073e6; padding: 15px 20px; text-align: center; }
        .header .site-name { color: white; font-size: 24px; font-weight: bold; text-decoration: none; }
        
        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        h2 { text-align: center; margin-bottom: 15px; color: #333; }
        
        .input-group { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #555; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        
        button { width: 100%; padding: 12px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; background: #16a34a; transition: 0.3s; }
        button:hover { background: #138b43; }
        
        /* Result Boxes */
        .result-section { margin-top: 20px; }
        h3 { font-size: 16px; color: #0073e6; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { font-size: 12px; background: #0073e6; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; border: none; }

        .output-box { 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            padding: 15px; 
            min-height: 80px; 
            background: #fff; 
            word-break: break-all;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.6;
            color: #d11010; /* Code-like red color for the tag */
            margin-bottom: 25px;
        }
        
        a#backHome { display: block; text-align: center; margin-top: 25px; text-decoration: none; color: #0073e6; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="site-name">CSR Tools</a>
</div>

<div class="container">
    <h2>🔑 Meta Keyword Generator</h2>

    <div class="input-group">
        <label>Enter Keyword or Phrase:</label>
        <input type="text" id="baseKeyword" placeholder="e.g. Karunashtakalu">
        <button onclick="generateMeta()">Generate Meta Tag</button>
    </div>

    <div class="result-section">
        <h3>
            HTML Meta Tag Result:
            <button class="copy-btn" onclick="copyMeta()">Copy Tag</button>
        </h3>
        <div id="metaOutput" class="output-box"></div>
    </div>

    <a id="backHome" href="index.html">← Back to Home</a>
</div>

<script>
function generateMeta() {
    let base = document.getElementById('baseKeyword').value.trim();
    if(!base) return alert("Please enter a keyword!");
    
    // Custom variations for your bhakti channel
    let variations = ["lyrics", "meaning", "bhakti", "stotram", "online", "2026", "namo narayanaya", "sangameshwar"];
    let results = [];
    
    variations.forEach(v => {
        results.push(`${base} ${v}`);
    });
    results.push(base);
    
    // Unique list
    let uniqueKeywords = [...new Set(results)].join(", ");

    // Generate the full HTML Tag string
    const fullTag = `<meta name="keywords" content="${uniqueKeywords}">`;
    
    document.getElementById('metaOutput').innerText = fullTag;
}

function copyMeta() {
    const text = document.getElementById('metaOutput').innerText;
    if(!text) return alert("Generate keywords first!");
    
    navigator.clipboard.writeText(text).then(() => {
        alert("Meta Tag copied to clipboard!");
    });
}
</script>

</body>
</html>
