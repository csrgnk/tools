
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Keyword Generator - CSR Tools</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: #f4f7f6;
        }

        .header {
            background: #0073e6;
            padding: 15px;
            text-align: center;
        }

        .header a {
            color: white;
            font-size: 22px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 25px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #0073e6;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #11863a;
        }

        .section-label {
            margin-top: 25px;
            font-weight: bold;
            color: #0073e6;
            display: flex;
            justify-content: space-between;
        }

        .copy-btn {
            background: #0073e6;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .output-box {
            margin-top: 10px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            border: 1px solid #ddd;
            word-break: break-all;
        }

        .meta {
            font-family: monospace;
            color: #b91c1c;
        }
    </style>
</head>

<body>

<div class="header">
    <a href="#">CSR Tools</a>
</div>

<div class="container">
    <h2>🎯 Pure Keyword Generator</h2>

    <input type="text" id="userInput" placeholder="Enter your keyword...">

    <button onclick="generate()">Generate</button>

    <div class="section-label">
        Hashtags
        <button class="copy-btn" onclick="copy('hashtags')">Copy</button>
    </div>
    <div id="hashtags" class="output-box"></div>

    <div class="section-label">
        Meta Tag
        <button class="copy-btn" onclick="copy('meta')">Copy</button>
    </div>
    <div id="meta" class="output-box meta"></div>
</div>

<script>
function generate() {
    let input = document.getElementById("userInput").value.trim();
    if (!input) return alert("Enter keyword");

    let words = input.split(" ");
    let list = [];

    // PURE formats only
    list.push(input); // original
    list.push(input.toLowerCase()); // small
    list.push(input.toUpperCase()); // capital

    if (words.length > 1) {
        list.push(words.join(""));   // no space
        list.push(words.join("-"));  // dashed
    }

    // remove duplicates
    list = [...new Set(list)];

    // hashtags
    let tags = list.map(k => "#" + k.replace(/[^a-zA-Z0-9]/g, "")).join(" ");
    document.getElementById("hashtags").innerText = tags;

    // meta
    document.getElementById("meta").innerText =
        `<meta name="keywords" content="${list.join(", ")}">`;
}

function copy(id) {
    let text = document.getElementById(id).innerText;
    if (!text) return;

    navigator.clipboard.writeText(text);
    alert("Copied!");
}
</script>

</body>
</html>
