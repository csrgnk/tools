<body>

<div class="header">
    <a href="index.html" class="site-name">CSR Tools</a>
</div>

<div class="container">
    <h2>🚀 Smart Keyword Generator</h2>

    <label>Enter Main Topic:</label>
    <input type="text" id="userInput" placeholder="e.g., Vishnu Sahasra Namam">

    <button id="genBtn" onclick="processKeywords()">Generate Keywords</button>

    <div class="section-label">
        1. SEO Hashtags
        <button class="copy-btn" onclick="copyValue('hashtagOutput')">Copy</button>
    </div>
    <div id="hashtagOutput" class="output-box"></div>

    <div class="section-label">
        2. Meta Keywords Tag
        <button class="copy-btn" onclick="copyValue('metaOutput')">Copy</button>
    </div>
    <div id="metaOutput" class="output-box meta-display"></div>

    <a id="back" href="index.html">← Back</a>
</div>

<script>
function processKeywords() {
    let input = document.getElementById('userInput').value.trim();
    if (!input) return alert("Please enter a topic!");

    let words = input.split(" ");
    let list = [];

    // Base keyword
    list.push(input);

    // Case variations
    list.push(input.toLowerCase());
    list.push(input.toUpperCase());

    // Combined formats
    if (words.length > 1) {
        list.push(words.join(""));
        list.push(words.join("-"));
    }

    // Generic SEO patterns (pure logic, not forced keywords)
    list.push("best " + input);
    list.push(input + " guide");
    list.push(input + " meaning");
    list.push(input + " benefits");

    // Remove duplicates
    list = [...new Set(list)];

    // Hashtags
    let hashtags = list.map(item => {
        let clean = item.replace(/[^a-zA-Z0-9]/g, "");
        return "#" + clean;
    }).join(" ");

    document.getElementById('hashtagOutput').innerText = hashtags;

    // Meta tag
    let meta = `<meta name="keywords" content="${list.join(", ")}">`;
    document.getElementById('metaOutput').innerText = meta;
}

function copyValue(id) {
    const text = document.getElementById(id).innerText;
    if (!text) return;

    navigator.clipboard.writeText(text).then(() => {
        alert("Copied!");
    });
}
</script>

</body>
</html>
