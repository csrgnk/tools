<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Keyword & Meta Tool - CSR Tools</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background: #f4f7f6; }
        .header { background: #0073e6; padding: 15px; text-align: center; }
        .header .site-name { color: white; font-size: 22px; font-weight: bold; text-decoration: none; }
        
        .container { max-width: 850px; margin: 30px auto; padding: 25px; background: white; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-top: 0; }
        
        input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #16a34a; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #11863a; }

        .section-label { margin-top: 25px; font-weight: bold; color: #0073e6; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eef2f3; padding-bottom: 5px; }
        .copy-btn { background: #0073e6; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }

        .output-box { 
            margin-top: 10px; padding: 15px; background: #fafafa; border: 1px solid #ddd; border-radius: 8px; 
            font-family: 'Courier New', monospace; font-size: 14px; line-height: 1.6; color: #333; word-break: break-all;
        }
        .meta-type { color: #b91c1c; border-color: #0073e6; background: #fdfdfd; }
        
        .back-link { display: block; text-align: center; margin-top: 30px; color: #666; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="site-name">CSR Tools</a>
</div>

<div class="container">
    <h2>🤖 AI Keyword & Meta Generator</h2>
    <input type="text" id="userInput" placeholder="Enter topic (e.g., Karunashtakalu 1st Ashtakam)">
    <button onclick="generateAll()">Generate Keywords & Meta Tag</button>

    <div class="section-label">
        1. Direct Keywords (Clean List)
        <button class="copy-btn" onclick="copyText('directOutput')">Copy List</button>
    </div>
    <div id="directOutput" class="output-box">Keywords will appear here...</div>

    <div class="section-label">
        2. HTML Meta Tag
        <button class="copy-btn" onclick="copyText('metaOutput')">Copy HTML Tag</button>
    </div>
    <div id="metaOutput" class="output-box meta-type">Meta tag will appear here...</div>

    <a href="index.html" class="back-link">← Back to Dashboard</a>
</div>

<script>
function generateAll() {
    let input = document.getElementById('userInput').value.trim();
    if(!input) return alert("Please enter text!");

    // AI Logical Keywords (Clean & Professional)
    let keywords = [
        input,
        `${input} telugu`,
        `bhakthi ${input}`,
        `${input} 2026`,
        "Sangameshwar",
        "Namo Narayanaya Bhakthi Channel",
        "omnnbc"
    ];

    // Remove duplicates
    let cleanList = [...new Set(keywords)].join(", ");

    // 1. Display Direct Keywords
    document.getElementById('directOutput').innerText = cleanList;

    // 2. Display Meta Tag
    const finalMeta = `<meta name="keywords" content="${cleanList}">`;
    document.getElementById('metaOutput').innerText = finalMeta;
}

function copyText(elementId) {
    const text = document.getElementById(elementId).innerText;
    if(text.includes("appear here")) return;
    navigator.clipboard.writeText(text).then(() => {
        alert("Copied to clipboard!");
    });
}
</script>

</body>
</html>
