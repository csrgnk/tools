<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Pure Keyword Generator</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background: #f4f7f6; color: #333; }
        .header { background: #0073e6; padding: 15px; text-align: center; }
        .header .site-name { color: white; font-size: 22px; font-weight: bold; text-decoration: none; }
        .container { max-width: 850px; margin: 30px auto; padding: 25px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 15px; margin: 10px 0 20px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button#genBtn { width: 100%; padding: 15px; background: #16a34a; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .section-label { margin-top: 30px; font-weight: bold; color: #0073e6; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 8px; }
        .copy-btn { background: #0073e6; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .output-box { margin-top: 10px; padding: 15px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; line-height: 1.6; word-break: break-all; min-height: 50px; }
        .meta-display { font-family: 'Courier New', monospace; color: #b91c1c; }
        a#back { display: block; text-align: center; margin-top: 25px; text-decoration: none; color: #666; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="site-name">CSR Tools</a>
</div>

<div class="container">
    <h2 style="text-align: center; margin-top: 0;">🎯 Pure SEO Keyword Generator</h2>
    
    <label>Enter Topic (e.g., Vishnu Sahasra Namam):</label>
    <input type="text" id="userInput" placeholder="Paste your main title here...">
    
    <button id="genBtn" onclick="generateSEO()">Generate Topic-Based Keywords</button>

    <div class="section-label">
        1. Search-Focused Hashtags
        <button class="copy-btn" onclick="copyValue('hashtagOutput')">Copy</button>
    </div>
    <div id="hashtagOutput" class="output-box"></div>

    <div class="section-label">
        2. SEO Meta Code
        <button class="copy-btn" onclick="copyValue('metaOutput')">Copy</button>
    </div>
    <div id="metaOutput" class="output-box meta-display"></div>

    <a id="back" href="index.html">← Back to Dashboard</a>
</div>

<script>
function generateSEO() {
    let input = document.getElementById('userInput').value.trim();
    if(!input) return alert("Please enter a topic!");

    // Pure topic-based keywords only (Removed Name/Channel)
    let variations = [
        input,
        `${input} Telugu`,
        `${input} Stotram`,
        `${input} Lyrics`,
        `${input} Meaning`,
        `${input} 2026`,
        `Bhakti ${input}`,
        `Full ${input}`
    ];

    // 1. Generate Hashtags
    let hashtags = variations.map(tag => {
        let clean = tag.replace(/[^a-zA-Z0-9]/g, "");
        return "#" + clean;
    }).join(" ");
    document.getElementById('hashtagOutput').innerText = hashtags;

    // 2. Generate Meta Tag
    let metaKeywords = variations.join(", ");
    document.getElementById('metaOutput').innerText = `<meta name="keywords" content="${metaKeywords}">`;
}

function copyValue(id) {
    const text = document.getElementById(id).innerText;
    if(!text) return;
    navigator.clipboard.writeText(text).then(() => alert("Copied!"));
}
</script>

</body>
</html>
